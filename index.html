<body>
<div id="root"></div>
<script>
const {
  useState,
  useMemo,
  useCallback,
  useEffect,
  useRef
} = React;
const DAYS = ["Saturday", "Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
const DAY_ABBR = ["Sat", "Sun", "Mon", "Tue", "Wed", "Thu", "Fri"];
const COLORS = ["#2EC4B6", "#E84855", "#F9C22E", "#7FB3D3", "#9B8FBB", "#FF8C42", "#F4ACB7", "#3A86FF", "#FFDD57", "#06D6A0", "#E056A0", "#5E60CE"];
const STORE = "shift-scheduler-v5";
const WORKER_URL = "https://berklee.bryandimaio.com";
const D_SHIFTS = [{
  id: "s1",
  name: "Morning",
  start: "07:30",
  end: "13:45"
}, {
  id: "s2",
  name: "Afternoon",
  start: "13:45",
  end: "20:00"
}, {
  id: "s3",
  name: "Closing",
  start: "20:00",
  end: "02:15"
}];
const D_LOCS = [{
  id: "l1",
  name: "150-1"
}, {
  id: "l2",
  name: "150-2"
}, {
  id: "l3",
  name: "160A"
}, {
  id: "l4",
  name: "160B"
}];
const D_EMP = Array.from({
  length: 12
}, (_, i) => ({
  id: `e${i}`,
  name: "",
  color: COLORS[i],
  pref: "",
  shiftPref: ""
}));
function t2m(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}
function dur(a, b) {
  let s = t2m(a),
    e = t2m(b);
  if (e <= s) e += 1440;
  return (e - s) / 60;
}
function fmtDur(h) {
  const hr = Math.floor(h),
    mn = Math.round((h - hr) * 60);
  return mn > 0 ? `${hr}h ${mn}m` : `${hr}h`;
}
function genTimes() {
  const o = [];
  for (let h = 0; h < 24; h++) for (let m = 0; m < 60; m += 15) {
    const v = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    o.push({
      v,
      l: `${h12}:${String(m).padStart(2, "0")} ${h < 12 ? "AM" : "PM"}`
    });
  }
  return o;
}
const TIMES = genTimes();
function uid() {
  return Math.random().toString(36).slice(2, 8);
}
function tl(t) {
  return TIMES.find(o => o.v === t)?.l || t;
}
function load(key) {
  try {
    const d = localStorage.getItem(key);
    if (d) return JSON.parse(d);
  } catch (e) {}
  return null;
}
function save(key, d) {
  try {
    localStorage.setItem(key, JSON.stringify(d));
  } catch (e) {}
}
function workerReady() {
  return WORKER_URL && !WORKER_URL.includes("YOUR-SUBDOMAIN");
}
function parsePaste(text) {
  const lines = text.split(/\r?\n/).filter(s => s.trim());
  if (!lines.length) return [];
  const hasTabsInMost = lines.filter(l => l.includes("\t")).length > lines.length * 0.3;
  if (!hasTabsInMost) return lines.slice(0, 12).map(l => ({
    name: l.trim(),
    shiftPref: "",
    pref: ""
  }));
  const rows = lines.map(l => l.split("\t").map(c => c.trim()));
  const firstRow = rows[0].map(c => c.toLowerCase());
  const headerKeywords = ["name", "responded", "m/o", "m/c", "preference", "pref", "shift", "notes"];
  const isHeader = firstRow.some(c => headerKeywords.some(k => c.includes(k)));
  const dataRows = isHeader ? rows.slice(1) : rows;
  let nameCol = 0,
    moCol = -1,
    prefCol = -1;
  if (isHeader) {
    firstRow.forEach((c, i) => {
      if (c.includes("name")) nameCol = i;else if (c === "m/o" || c === "m/c" || c.includes("shift type") || c === "mo") moCol = i;else if (c.includes("pref") || c.includes("notes")) prefCol = i;
    });
  }
  if (moCol === -1 || prefCol === -1) {
    const moP = /^(mornings?|overnights?|afternoons?|closing)$/i;
    const bP = /^(true|false|yes|no|✓|☑|☐)$/i;
    if (dataRows.length > 0) {
      const nc = Math.max(...dataRows.map(r => r.length));
      for (let ci = 0; ci < nc; ci++) {
        const vs = dataRows.map(r => r[ci] || "").filter(Boolean);
        if (ci === nameCol) continue;
        if (moCol === -1 && vs.some(v => moP.test(v))) {
          moCol = ci;
          continue;
        }
        if (vs.every(v => bP.test(v) || !v)) continue;
        if (prefCol === -1) {
          if (vs.reduce((a, v) => a + v.length, 0) / (vs.length || 1) > 15) prefCol = ci;
        }
      }
      if (prefCol === -1) {
        for (let ci = nc - 1; ci >= 0; ci--) {
          if (ci === nameCol || ci === moCol) continue;
          const vs = dataRows.map(r => r[ci] || "").filter(Boolean);
          if (vs.every(v => bP.test(v) || !v)) continue;
          if (vs.length > 0) {
            prefCol = ci;
            break;
          }
        }
      }
    }
  }
  return dataRows.slice(0, 12).map(row => ({
    name: (row[nameCol] || "").trim(),
    shiftPref: moCol >= 0 ? (row[moCol] || "").trim().replace(/^(mornings?|morning)$/i, "Morning/Afternoon").replace(/^(overnights?|closing)$/i, "Afternoon/Closing").replace(/^afternoons?$/i, "Morning/Afternoon") : "",
    pref: prefCol >= 0 ? (row[prefCol] || "").trim() : ""
  })).filter(r => r.name);
}
async function captureElement(el, filename) {
  if (typeof html2canvas === "undefined") {
    alert("html2canvas not loaded yet.");
    return;
  }
  const canvas = await html2canvas(el, {
    backgroundColor: "#FAF8F4",
    scale: 2,
    useCORS: true,
    logging: false
  });
  const link = document.createElement("a");
  link.download = filename;
  link.href = canvas.toDataURL("image/png");
  link.click();
}
async function apiCall(method, path, body) {
  const res = await fetch(`${WORKER_URL}/schedule${path}`, {
    method,
    headers: {
      "Content-Type": "application/json"
    },
    credentials: "include",
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    const t = await res.text();
    throw new Error(`${res.status}: ${t}`);
  }
  return res.json();
}
function App() {
  const sv = useMemo(() => load(STORE), []);
  const [shifts, setShifts] = useState(sv?.shifts || D_SHIFTS);
  const [locs, setLocs] = useState(sv?.locs || D_LOCS);
  const [emps, setEmps] = useState(() => {
    if (sv?.emps) return sv.emps.map(e => ({
      pref: "",
      shiftPref: "",
      ...e
    }));
    return D_EMP;
  });
  const [sched, setSched] = useState(sv?.sched || {});
  const [off, setOff] = useState(new Set(sv?.off || []));
  const [cfgOpen, setCfgOpen] = useState(true);
  const [editMode, setEditMode] = useState(false);
  const [paintMode, setPaintMode] = useState(false);
  const [paintId, setPaintId] = useState(null);
  const [paste, setPaste] = useState("");
  const [showPrefs, setShowPrefs] = useState(true);
  const [snapshots, setSnapshots] = useState([]);
  const [snapName, setSnapName] = useState("");
  const [snapLoading, setSnapLoading] = useState(false);
  const [snapMsg, setSnapMsg] = useState("");
  const [showSnapPanel, setShowSnapPanel] = useState(false);
  const [soloId, setSoloId] = useState(null);
  const [showSolo, setShowSolo] = useState(false);
  const gridRef = useRef(null);
  const soloRef = useRef(null);
  const exportRef = useRef(null);
  useEffect(() => {
    save(STORE, {
      shifts,
      locs,
      emps,
      sched,
      off: [...off]
