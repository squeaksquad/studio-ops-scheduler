<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shift Scheduler — Studio Operations</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:#FAF8F4;color:#1a1a1a}
  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-track{background:#f0ece4;border-radius:4px}
  ::-webkit-scrollbar-thumb{background:#c4bfb4;border-radius:4px}
  select{cursor:pointer}
  .root{padding:20px 24px;min-height:100vh}
  .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px}
  .title{font-size:22px;font-weight:700;letter-spacing:-0.02em}
  .subtitle{font-size:13px;color:#7a756a;margin-top:2px}
  .header-btns{display:flex;gap:8px;flex-wrap:wrap}
  .btn-primary{background:#2a2a2a;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Nunito',sans-serif}
  .btn-primary:hover{background:#3a3a3a}
  .btn-secondary{background:#fff;color:#1a1a1a;border:1px solid #d0cbc2;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Nunito',sans-serif}
  .btn-secondary:hover{background:#f5f2ec}
  .btn-active{background:#2a6e5a!important;color:#fff!important;border-color:#2a6e5a!important}
  .btn-active:hover{background:#35876e!important}
  .btn-remove{background:none;border:1px solid #e0dbd2;color:#999;width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
  .btn-remove:hover{border-color:#c00;color:#c00}
  .btn-add{background:none;border:1px dashed #c4bfb4;color:#7a756a;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;margin-top:4px}
  .btn-add:hover{border-color:#999;color:#555}
  .btn-sm{padding:5px 10px;font-size:12px;border-radius:5px}
  .btn-arrow{background:none;border:1px solid #d0cbc2;color:#999;width:22px;height:18px;border-radius:3px;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;padding:0}
  .btn-arrow:hover:not(:disabled){border-color:#666;color:#333}
  .btn-arrow:disabled{opacity:.3;cursor:default}
  .loc-arrows{display:flex;flex-direction:column;gap:2px}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:8px;flex-wrap:wrap}
  .toolbar-left{display:flex;gap:6px;flex-wrap:wrap}
  .btn-tool{background:#fff;border:1px solid #e0dbd2;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;gap:6px;color:#555}
  .btn-tool:hover{background:#f5f2ec;border-color:#ccc}
  .btn-tool-active{background:#f0ece4;border-color:#c4bfb4}
  .tool-icon{font-size:14px}
  .btn-undo{background:#fff;border:1px solid #e0dbd2;padding:6px 10px;border-radius:6px;font-size:14px;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;color:#555;min-width:34px}
  .btn-undo:hover:not(:disabled){background:#f5f2ec;border-color:#ccc}
  .btn-undo:disabled{opacity:.3;cursor:default}
  .undo-group{display:flex;gap:4px;align-items:center}
  .undo-count{font-size:10px;color:#999;font-variant-numeric:tabular-nums;min-width:16px;text-align:center}
  .snap-panel{background:#fff;border:1px solid #e0dbd2;border-radius:10px;padding:16px 20px;margin-bottom:16px}
  .snap-save-row{display:flex;gap:8px;margin-bottom:8px}
  .snap-msg{font-size:12px;color:#2a6e5a;margin-bottom:8px;font-weight:500}
  .snap-list{border-top:1px solid #e0dbd2;padding-top:10px;margin-top:4px}
  .snap-list-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#999;margin-bottom:8px}
  .snap-item{display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid #f0ece4}
  .snap-item-name{font-weight:600;flex:1}
  .snap-empty{font-size:12px;color:#999;padding:8px 0}
  .btn-snap-delete{color:#c00!important;border-color:#e8c8c8!important;min-width:28px;padding:5px 8px!important}
  .btn-snap-delete:hover{background:#fef2f2!important;border-color:#c00!important}
  .config-panel{background:#fff;border:1px solid #e0dbd2;border-radius:10px;padding:20px;margin-bottom:20px;display:flex;gap:32px;flex-wrap:wrap}
  .config-section{flex:1 1 260px;min-width:260px}
  .config-section-wide{flex:2 1 400px;min-width:300px}
  .config-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:#7a756a;margin-bottom:10px}
  .config-hint{font-size:11px;color:#aaa;margin:-6px 0 10px}
  .config-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .config-label{font-size:12px;color:#999}
  .input{font-family:'Nunito',sans-serif;font-size:13px;border:1px solid #d0cbc2;border-radius:5px;padding:5px 8px;background:#FAF8F4;outline:none;color:#1a1a1a}
  .input:focus{border-color:#999}
  .input-narrow{width:120px}
  .select-time{font-family:'Nunito',sans-serif;font-size:12px;border:1px solid #d0cbc2;border-radius:5px;padding:5px 6px;background:#FAF8F4;outline:none;color:#1a1a1a}
  .duration-badge{font-size:11px;color:#2a6e5a;background:#e6f5f0;padding:3px 8px;border-radius:4px;font-weight:600;white-space:nowrap;font-variant-numeric:tabular-nums}
  .color-picker{width:24px;height:24px;border:1px solid #d0cbc2;border-radius:4px;padding:0;cursor:pointer;flex-shrink:0;background:none;-webkit-appearance:none;appearance:none}
  .color-picker::-webkit-color-swatch-wrapper{padding:1px}
  .color-picker::-webkit-color-swatch{border:none;border-radius:3px}
  .color-picker::-moz-color-swatch{border:none;border-radius:3px}
  .color-dot-sm{width:10px;height:10px;border-radius:3px;flex-shrink:0;display:inline-block}
  .paste-area{width:100%;min-height:56px;font-family:'Nunito',sans-serif;font-size:12px;border:1px dashed #c4bfb4;border-radius:6px;padding:8px;background:#faf8f4;outline:none;color:#1a1a1a;resize:vertical;margin-bottom:6px}
  .paste-area:focus{border-color:#2a6e5a;border-style:solid}
  .paste-preview{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:#666;flex-wrap:wrap}
  .paste-tag{background:#f0ece4;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
  .paste-tag-blue{background:#e3edf7;color:#3a6ea5}
  .paste-tag-green{background:#e6f5f0;color:#2a6e5a}
  .employee-list{display:flex;flex-direction:column;gap:6px}
  .emp-card{display:flex;flex-direction:column;gap:4px}
  .emp-card-top{display:flex;align-items:center;gap:6px}
  .emp-name-input{flex:1;min-width:100px}
  .emp-pref-input{font-size:12px;padding:4px 8px;margin-left:30px;color:#666;border-color:#e8e4dc}
  .emp-pref-input:focus{color:#1a1a1a;border-color:#999}
  .select-mo{font-family:'Nunito',sans-serif;font-size:11px;border:1px solid #d0cbc2;border-radius:4px;padding:3px 6px;background:#faf8f4;color:#666;outline:none;min-width:130px}
  .edit-banner{background:#FFF3CD;border:1px solid #E8D5A0;border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:13px;font-weight:500;color:#856404}
  .paint-banner{border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#E8F5E9;border:1px solid #A5D6A7}
  .paint-palette{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
  .paint-chip{padding:5px 12px;border-radius:5px;font-size:13px;cursor:pointer;border:2px solid transparent;font-weight:600;transition:all .1s;user-select:none}
  .paint-chip:hover{opacity:.85}
  .paint-chip-active{border-color:#1a1a1a!important;box-shadow:0 0 0 2px rgba(0,0,0,.12)}
  .paint-chip-erase{background:#f0ece4;color:#666;border:2px dashed #ccc}
  .paint-chip-erase.paint-chip-active{border-color:#c00!important;border-style:solid}
  .grid-scroll{overflow-x:auto;border:1px solid #d0cbc2;border-radius:10px;background:#fff;margin-bottom:20px}
  table{width:100%;border-collapse:collapse;min-width:950px;table-layout:fixed}
  th{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:10px 8px;background:#F0EDE6;color:#5a5548;text-align:center;border-bottom:2px solid #d0cbc2;position:sticky;top:0;z-index:10}
  th:not(.sticky-shift):not(.sticky-loc){width:calc((100% - 130px - 70px) / 7)}
  th.sticky-shift{position:sticky;left:0;z-index:12;width:130px}
  th.sticky-loc{position:sticky;left:130px;z-index:12;width:70px}
  td.sticky-shift{position:sticky;left:0;z-index:6}
  td.sticky-loc{position:sticky;left:130px;z-index:5}
  td.shift-label{padding:8px 10px;text-align:center;font-size:13px;vertical-align:middle}
  .shift-label-inner{display:flex;flex-direction:column;align-items:center;gap:1px}
  .shift-time{font-size:10px;color:#7a756a;font-variant-numeric:tabular-nums;line-height:1.4}
  td.loc-label{font-size:13px;font-weight:600;padding:8px 10px;text-align:center}
  td.cell{padding:4px 6px;text-align:center;vertical-align:middle}
  .shift-group-first td{border-top:5px solid #2a2a2a}
  .cell-select{width:100%;font-family:'Nunito',sans-serif;font-size:14px;border:1px solid #d0cbc2;border-radius:5px;padding:5px 4px;background:#fff;outline:none;cursor:pointer;text-align:center;text-align-last:center}
  .paint-cell{cursor:pointer;min-height:34px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;transition:background .1s;user-select:none;padding:5px 4px}
  .paint-cell:hover{filter:brightness(.92)}
  .stats-panel{background:#fff;border:1px solid #d0cbc2;border-radius:10px;padding:20px;overflow-x:auto}
  .stats-title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px;flex-wrap:wrap}
  .stats-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#7a756a}
  .stats-scroll{overflow-x:auto}
  .stats-header{display:flex;border-bottom:2px solid #d0cbc2;padding-bottom:6px;margin-bottom:4px;min-width:500px}
  .stats-row{display:flex;padding:6px 0;border-bottom:1px solid #f0ece4;align-items:center;min-width:500px}
  .stats-cell{font-family:'Nunito',sans-serif;font-size:13px;display:flex;align-items:center;gap:6px;font-variant-numeric:tabular-nums}
  .stats-name{flex:0 0 210px;min-width:170px}
  .stats-mo{flex:0 0 140px;justify-content:center}
  .stats-num{flex:0 0 80px;justify-content:center;text-align:center}
  .stats-bold{font-weight:700}
  .stats-hours{font-weight:700;color:#2a6e5a}
  .stats-pref{flex:1 1 200px;min-width:150px}
  .stats-pref-text{font-size:12px;color:#777;line-height:1.3}
  .stats-actions{display:flex;gap:4px;margin-left:auto;flex-shrink:0}
  .btn-stat{background:none;border:1px solid #e0dbd2;width:26px;height:26px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#999;padding:0;flex-shrink:0}
  .btn-stat:hover{border-color:#999;color:#555;background:#f5f2ec}
  .btn-stat-active{background:#d4a017!important;border-color:#d4a017!important;color:#fff!important}
  .btn-stat-copied{background:#2a6e5a!important;border-color:#2a6e5a!important;color:#fff!important}
  .hl-dim{opacity:0.08!important;pointer-events:none}
  .hl-dim-row{opacity:0.15}
  .mo-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px}
  .mo-badge.mo-ma{background:#FFF8E7;color:#9a7b2d;border:1px solid #E8D5A0}
  .mo-badge.mo-ac{background:#ECEEFF;color:#5558a0;border:1px solid #A8ABE8}
  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:#FAF8F4;border-radius:12px;padding:24px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .modal-title{font-size:18px;font-weight:700}
  .modal-controls{display:flex;gap:8px;margin-bottom:16px;align-items:center}
  .solo-container{background:#fff;border:1px solid #d0cbc2;border-radius:10px;overflow:hidden}
  .solo-header{padding:16px 20px;background:#FAFAF7;border-bottom:1px solid #e0dbd2}
  .solo-name{font-size:20px;font-weight:700}
  .solo-subtitle{font-size:12px;color:#999;margin-top:2px}
  .solo-table{width:100%;border-collapse:collapse;table-layout:fixed}
  .solo-table th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:8px 12px;background:#F0EDE6;color:#5a5548;text-align:left;border-bottom:2px solid #d0cbc2;position:static}
  .solo-table th:nth-child(1){width:22%}
  .solo-table th:nth-child(2){width:22%}
  .solo-table th:nth-child(3){width:36%}
  .solo-table th:nth-child(4){width:20%}
  .solo-table td{padding:8px 12px;border-bottom:1px solid #f0ece4;font-size:13px}
  .solo-time{white-space:nowrap}
  .solo-time{font-variant-numeric:tabular-nums;font-size:12px;color:#777}
  .solo-footer{padding:12px 20px;background:#FAFAF7;border-top:1px solid #e0dbd2;font-size:13px;font-weight:600;color:#555}
  .solo-empty{padding:24px;text-align:center;color:#999}
  .export-container{width:1100px;padding:24px;background:#FAF8F4;font-family:'Nunito',sans-serif}
  .export-header{margin-bottom:16px}
  .export-title{font-size:18px;font-weight:700}
  .export-date{font-size:12px;color:#999;margin-top:4px}
  .export-table{width:100%;border-collapse:collapse;border:1px solid #d0cbc2;border-radius:8px;overflow:hidden;table-layout:fixed}
  .export-table th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:8px;background:#F0EDE6;color:#5a5548;text-align:center;border-bottom:2px solid #d0cbc2}
  .export-table td{border-right:1px solid #e8e4dc}
  @media(max-width:700px){
    .root{padding:10px 8px}
    .header{flex-direction:column;gap:8px}
    .header-btns{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .header-btns .btn-secondary,.header-btns .btn-primary{text-align:center;justify-content:center;padding:10px 8px}
    .title{font-size:19px}
    .toolbar{flex-direction:column;align-items:stretch;gap:6px}
    .toolbar-left{justify-content:space-between}
    .config-panel{flex-direction:column;gap:16px;padding:14px}
    .config-section,.config-section-wide{min-width:0!important;flex-basis:100%!important}
    .config-row{flex-wrap:wrap}
    .input-narrow{width:100px}
    .select-mo{min-width:110px}
    .emp-pref-input{margin-left:30px}
    .grid-scroll{border-radius:6px;-webkit-overflow-scrolling:touch}
    table{min-width:650px}
    th:not(.sticky-shift):not(.sticky-loc){width:calc((100% - 90px - 46px) / 7)}
    th.sticky-shift{width:90px!important}
    th.sticky-loc{left:90px!important;width:46px!important}
    td.sticky-shift{left:0}
    td.sticky-loc{left:90px!important}
    td.shift-label{padding:5px 3px;font-size:11px}
    .shift-label-inner strong{font-size:11px}
    .shift-time{font-size:8px;white-space:normal;line-height:1.3}
    td.loc-label{font-size:10px;font-weight:700;padding:4px 2px}
    td.cell{padding:3px 2px}
    .cell-select{font-size:11px;padding:3px 1px;border-radius:4px}
    .paint-cell{font-size:11px;padding:3px 2px;min-height:28px;border-radius:4px}
    th{font-size:10px;padding:8px 4px;letter-spacing:.02em}
    .shift-group-first td{border-top:3px solid #2a2a2a}
    .paint-banner{flex-direction:column;align-items:stretch;gap:8px;padding:10px 12px;font-size:12px}
    .paint-palette{gap:3px}
    .paint-chip{padding:4px 8px;font-size:11px}
    .edit-banner{font-size:12px;padding:8px 12px}
    .snap-panel{padding:12px 14px}
    .snap-save-row{flex-direction:column;gap:6px}
    .stats-panel{padding:14px 10px;border-radius:8px}
    .stats-header,.stats-row{min-width:420px}
    .stats-name{flex:0 0 110px;min-width:90px}
    .stats-mo{flex:0 0 100px}
    .stats-num{flex:0 0 55px}
    .stats-cell{font-size:12px}
    .stats-pref{min-width:100px}
    .modal-overlay{padding:8px}
    .modal{padding:16px;border-radius:10px}
    .modal-title{font-size:16px}
    .solo-header{padding:12px 14px}
    .solo-name{font-size:17px}
    .solo-table th,.solo-table td{padding:6px 8px;font-size:12px}
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
const {
  useState,
  useMemo,
  useCallback,
  useEffect,
  useRef
} = React;
const DAYS = ["Saturday", "Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
const DAY_ABBR = ["Sat", "Sun", "Mon", "Tue", "Wed", "Thu", "Fri"];
const COLORS = ["#FF1744", "#00C853", "#2979FF", "#FFD600", "#E040FB", "#FF6D00", "#00BCD4", "#FF4081", "#1DE9B6", "#C6FF00", "#FF9E80", "#B388FF"];
function cTxt(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*299+g*587+b*114)/1000>150?"#1a1a1a":"#fff"}
const STORE = "shift-scheduler-v6";
const STORE_OLD = "shift-scheduler-v5";
const WORKER_URL = "https://berklee.bryandimaio.com";
const D_SHIFTS = [{
  id: "s1",
  name: "Morning",
  start: "07:30",
  end: "13:45"
}, {
  id: "s2",
  name: "Afternoon",
  start: "13:45",
  end: "20:00"
}, {
  id: "s3",
  name: "Closing",
  start: "20:00",
  end: "02:15"
}];
const D_LOCS = [{
  id: "l1",
  name: "150-1"
}, {
  id: "l2",
  name: "150-2"
}, {
  id: "l3",
  name: "160A"
}, {
  id: "l4",
  name: "160B"
}];
const D_EMP = Array.from({
  length: 12
}, (_, i) => ({
  id: `e${i}`,
  name: "",
  color: COLORS[i],
  pref: "",
  shiftPref: ""
}));
function t2m(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}
function dur(a, b) {
  let s = t2m(a),
    e = t2m(b);
  if (e <= s) e += 1440;
  return (e - s) / 60;
}
function fmtDur(h) {
  const hr = Math.floor(h),
    mn = Math.round((h - hr) * 60);
  return mn > 0 ? `${hr}h ${mn}m` : `${hr}h`;
}
function genTimes() {
  const o = [];
  for (let h = 0; h < 24; h++) for (let m = 0; m < 60; m += 15) {
    const v = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    o.push({
      v,
      l: `${h12}:${String(m).padStart(2, "0")} ${h < 12 ? "AM" : "PM"}`
    });
  }
  return o;
}
const TIMES = genTimes();
function uid() {
  return Math.random().toString(36).slice(2, 8);
}
function fName(n) {
  return (n || "").split(/\s+/)[0];
}
function tl(t) {
  return TIMES.find(o => o.v === t)?.l || t;
}
function load(key) {
  try {
    const d = localStorage.getItem(key);
    if (d) return JSON.parse(d);
  } catch (e) {}
  return null;
}
function save(key, d) {
  try {
    localStorage.setItem(key, JSON.stringify(d));
  } catch (e) {}
}
function workerReady() {
  return WORKER_URL && !WORKER_URL.includes("YOUR-SUBDOMAIN");
